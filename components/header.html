<div class="header">
  <div class="header-left">
    <button id="btn-toggle-sidebar" title="Colapsar sidebar">
      <i class="bi bi-list"></i>
    </button>
    <div class="header-title">
      <b id="header-page-title">Panel</b>
      <span id="header-page-subtitle">Control y gestión</span>
    </div>
  </div>

  <div class="header-right">
    <div class="notification-container">
      <button id="btn-open-alerts" title="Notificaciones">
        <i class="bi bi-bell"></i>
        <span id="alerts-badge" style="display:none;">0</span>
      </button>
      
      <div id="alerts-dropdown" class="alerts-dropdown">
        <div class="alerts-header-mini">
          <b>Notificaciones Pendientes</b>
        </div>
        <div id="alerts-list-container" class="alerts-list">
          </div>
      </div>
    </div>

    <span class="user-name">Administración</span>
    <div class="user-avatar">A</div>
    
    <button id="btn-logout" title="Cerrar sesión">
      <i class="bi bi-box-arrow-right"></i>
    </button>
  </div>
</div>
