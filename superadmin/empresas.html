<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresas | Super Admin SaaS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/css/main.css">

    <style>
        /* --- 1. ESTILOS GENERALES Y RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .hidden { display: none !important; }
        
        /* --- 2. LAYOUT SUPERIOR --- */
        .page { padding: 25px; max-width: 1400px; margin: 0 auto; min-height: calc(100vh - 70px); }
        .page-header { margin-bottom: 25px; }
        .page-header h1 { margin: 0; color: #1e293b; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px; }
        .page-header p { color: #64748b; margin-top: 5px; font-size: 0.95rem; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; flex-wrap: wrap;}
        
        .search-box { 
            display: flex; align-items: center; background: white; border: 1.5px solid #e2e8f0; 
            border-radius: 10px; padding: 8px 15px; flex-grow: 1; max-width: 450px; transition: 0.2s;
        }
        .search-box:focus-within { border-color: #9333ea; box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.1); }
        .search-box i { color: #94a3b8; margin-right: 10px; font-size: 1.1rem; }
        .search-box input { border: none; outline: none; width: 100%; font-size: 0.95rem; background: transparent; font-family: 'Poppins', sans-serif; }

        .btn-super { 
            background: #9333ea; color: white; border: none; padding: 12px 24px; 
            font-weight: 600; border-radius: 10px; cursor: pointer; transition: 0.2s; 
            display: flex; align-items: center; gap: 8px; font-size: 0.95rem;
        }
        .btn-super:hover { background: #7e22ce; transform: translateY(-1px); }

        /* --- 3. TABLA --- */
        .card-table-wrapper { 
            background: white; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
            border: 1px solid #e2e8f0; overflow-x: auto; 
        }
        
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 800px; }
        table th { 
            background: #f8fafc; color: #64748b; font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; padding: 18px 20px; border-bottom: 2px solid #f1f5f9; 
            letter-spacing: 0.5px;
        }
        table td { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; color: #334155; font-size: 0.95rem; }

        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; display: inline-block; text-align: center; text-transform: uppercase; letter-spacing: 0.5px;}
        .badge-active { background: #dcfce7; color: #16a34a; } 
        .badge-suspended { background: #fee2e2; color: #dc2626; } 

        .table-actions { display: flex; gap: 8px; justify-content: center;}
        .btn-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: none; cursor: pointer; transition: 0.2s; color: white; font-size: 1rem; }
        .btn-edit { background: #3b82f6; } .btn-edit:hover { background: #2563eb; }
        .btn-del { background: #ef4444; } .btn-del:hover { background: #dc2626; }

        /* --- 4. MODAL (ARREGLO DE SCROLL Y TAMAÑO) --- */
        .modal { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); 
            display: flex; align-items: center; justify-content: center; 
            z-index: 9999; padding: 20px; overflow: hidden; /* Evita scroll en la pantalla de fondo */
        }

        .modal-content { 
            width: 100%; max-width: 600px; /* Modal más compacto */
            max-height: 85vh; /* Altura máxima segura */
            overflow-y: auto; /* Scroll vertical SOLO si es necesario */
            overflow-x: hidden; /* BLOQUEA el scroll horizontal (doble scroll) */
            background: white; border-radius: 20px; padding: 30px; 
            position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
        }
        
        /* Scrollbar personalizado limpio */
        .modal-content::-webkit-scrollbar { width: 6px; }
        .modal-content::-webkit-scrollbar-track { background: transparent; }
        .modal-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        #modal-title { margin-top: 0; color: #1e293b; font-weight: 800; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; font-size: 1.4rem; letter-spacing: -0.5px; }

        .section-title { 
            font-size: 0.8rem; font-weight: 700; color: #9333ea; background: #fdfaff; 
            padding: 8px 12px; border-radius: 6px; margin-top: 20px; margin-bottom: 15px; 
            text-transform: uppercase; display: inline-block; letter-spacing: 0.5px;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .full-width { grid-column: span 2; }
        
        .form-group { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .form-group label { font-weight: 600; color: #475569; font-size: 0.85rem; }
        .form-group input, .form-group select { 
            width: 100%; padding: 12px 15px; border: 1.5px solid #e2e8f0; border-radius: 10px; 
            font-size: 0.95rem; font-family: 'Poppins', sans-serif; outline: none; 
            transition: all 0.2s; background: #ffffff; color: #1e293b;
        }
        .form-group input:focus, .form-group select:focus { border-color: #9333ea; box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.1); }
        .plan-selector { border: 2px solid #e9d5ff !important; background-color: #fdfaff !important; font-weight: 600 !important; color: #7e22ce !important; }

        .owner-hint { font-size: 0.8rem; color: #64748b; margin: -5px 0 15px; line-height: 1.5; }

        .modal-actions { 
            display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px; 
            border-top: 1px solid #f1f5f9; padding-top: 20px; 
        }
        .btn-cancel-modal { 
            background: #f8fafc; border: 1.5px solid #e2e8f0; color: #64748b; 
            padding: 12px 20px; border-radius: 10px; font-weight: 600; 
            cursor: pointer; transition: 0.2s; font-family: 'Poppins', sans-serif;
        }
        .btn-cancel-modal:hover { background: #f1f5f9; color: #475569; }

        /* --- 5. MEDIA QUERIES (ADAPTACIÓN PERFECTA A MOBILE) --- */
        @media (max-width: 768px) {
            .page { padding: 15px; }
            
            .top-bar { flex-direction: column; align-items: stretch; gap: 12px; }
            .search-box { max-width: 100%; }
            .btn-super { width: 100%; justify-content: center; }

            /* Ajustes estrictos para la tabla en móvil (sin scroll horizontal) */
            .card-table-wrapper { overflow-x: hidden; } /* Forzamos a que no haya scroll horizontal */
            table { min-width: 100%; width: 100%; } /* Quitamos el min-width de escritorio */
            
            table th, table td { padding: 12px 10px; } /* Reducimos el padding interno */

            /* Ocultamos todo excepto Empresa y Acciones */
            #tenants-table th:nth-child(1), #tenants-table td:nth-child(1), /* ID */
            #tenants-table th:nth-child(3), #tenants-table td:nth-child(3), /* Administrador */
            #tenants-table th:nth-child(4), #tenants-table td:nth-child(4), /* Plan */
            #tenants-table th:nth-child(5), #tenants-table td:nth-child(5)  /* Estado (Oculto como pediste) */ {
                display: none;
            }

            /* Ajustes del Modal para móvil */
            .modal { padding: 15px; }
            .modal-content { padding: 25px 20px; border-radius: 15px; }
            .form-grid { grid-template-columns: 1fr; gap: 12px; }
            .full-width { grid-column: span 1; }
            
            .modal-actions { flex-direction: column-reverse; }
            .modal-actions button { width: 100%; justify-content: center; padding: 14px; }
        }
    </style>
</head>
<body>

<div class="layout">
    <div id="sidebar"></div>
    <div class="content">
        <div id="header"></div>

        <div class="page">
            <div class="page-header">
                <h1>🏢 Gestión de Empresas (Tenants)</h1>
                <p>Control total de instancias, planes y verticales de negocio.</p>
            </div>

            <div class="top-bar">
                <div class="search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" id="search-tenant" placeholder="Buscar empresa o categoría...">
                </div>
                <button id="btn-new-tenant" class="btn-super">
                    <i class="bi bi-building-add"></i> Registrar Nueva
                </button>
            </div>

            <div class="card-table-wrapper">
                <table id="tenants-table">
                    <thead>
                        <tr>
                            <th style="width: 60px;">ID</th>
                            <th>Empresa / Vertical</th>
                            <th>Administrador</th>
                            <th>Plan Contratado</th>
                            <th>Estado</th>
                            <th style="text-align: center;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal hidden" id="tenant-modal">
    <div class="modal-content">
        <h2 id="modal-title">Registrar Nueva Empresa</h2>

        <form id="tenant-form">
            <input type="hidden" id="tenant-id">

            <div class="section-title">1. Identidad y Plan</div>
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Nombre del Negocio / Marca *</label>
                    <input type="text" id="tenant-name" placeholder="Ej. Tecno Apple C.A." required>
                </div>
                
                <div class="form-group">
                    <label>Categoría *</label>
                    <select id="tenant-category" required>
                        <option value="" disabled selected>Seleccione...</option>
                        <option value="1">Tienda de Electrónica</option>
                        <option value="2">Moda y Calzado</option>
                        <option value="3">Taller Mecánico</option>
                        <option value="4">Manufactura / Producción</option>
                        <option value="5">Restaurante / Food Truck</option>
                        <option value="6">Servicios / Profesionales</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Nivel de Plan *</label>
                    <select id="tenant-plan-id" class="plan-selector" required>
                        <option value="1">BÁSICO (1 Sede)</option>
                        <option value="2">STANDARD (3 Sedes)</option>
                        <option value="3">PREMIUM (Ilimitado)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>RIF / Fiscal</label>
                    <input type="text" id="tenant-rif" placeholder="J-12345678-9">
                </div>
                <div class="form-group">
                    <label>Instagram (@)</label>
                    <input type="text" id="tenant-instagram" placeholder="nombre_tienda">
                </div>
                <div class="form-group full-width">
                    <label>Teléfono</label>
                    <input type="text" id="tenant-phone" placeholder="0412-0000000">
                </div>
                <div class="form-group full-width">
                    <label>Dirección</label>
                    <input type="text" id="tenant-address" placeholder="Ubicación">
                </div>
            </div>

            <div id="billing-section-container">
                <div class="section-title">2. Facturación</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Ciclo *</label>
                        <select id="tenant-plan">
                            <option value="MENSUAL">Mensual</option>
                            <option value="ANUAL">Anual</option>
                            <option value="LIFETIME">Vitalicio</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Inicio *</label>
                        <input type="date" id="tenant-start-date">
                    </div>
                </div>
            </div>

            <div id="owner-section-container">
                <div class="section-title">3. Cuenta Maestra</div>
                <p class="owner-hint">Se creará la sede principal para este usuario.</p>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Nombre Completo *</label>
                        <input type="text" id="owner-name" placeholder="Nombre del propietario">
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="owner-email" placeholder="admin@empresa.com">
                    </div>
                    <div class="form-group">
                        <label>Contraseña *</label>
                        <input type="password" id="owner-password" placeholder="Mínimo 6 caracteres">
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" id="btn-cancel" class="btn-cancel-modal">Cancelar</button>
                <button type="submit" class="btn-super">
                    <i class="bi bi-cloud-check"></i> Guardar
                </button>
            </div>
        </form>
    </div>
</div>

<div id="alert-modal" class="modal hidden">
    <div class="modal-content" style="max-width: 380px; text-align: center; padding: 30px;">
        <h3 id="alert-title" style="margin-top: 0; color: #1e293b;"></h3>
        <p id="alert-message" style="margin: 15px 0 25px; color: #64748b; line-height: 1.5; font-size: 0.95rem;"></p>
        <button id="alert-ok" class="btn-super" style="width: 100%; justify-content: center;">Entendido</button>
    </div>
</div>

<div id="confirm-modal" class="modal hidden">
    <div class="modal-content" style="max-width: 380px; text-align: center; padding: 30px;">
        <h3 id="confirm-title" style="margin-top: 0; color: #1e293b;"></h3>
        <p id="confirm-message" style="margin: 15px 0 25px; color: #64748b; line-height: 1.5; font-size: 0.95rem;"></p>
        <div style="display: flex; gap: 12px;">
            <button id="confirm-cancel" class="btn-cancel-modal" style="flex: 1;">Volver</button>
            <button id="confirm-ok" class="btn-super" style="flex: 1; justify-content: center;">Confirmar</button>
        </div>
    </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/superadmin_empresas.js"></script>

</body>
</html>
