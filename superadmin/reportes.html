<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes de Uso | Super Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
      .usage-table th { background: #f8fafc; color: #475569; font-size: 0.85rem; text-transform: uppercase; padding: 15px; }
      .usage-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; color: #1e293b; }
      .usage-table tr:hover td { background: #f8fafc; }
      .stat-highlight { font-weight: 800; color: #0284c7; }
      .money-highlight { font-weight: 800; color: #16a34a; }
      /* --- AJUSTES PARA MÓVIL (SIN SCROLL) --- */
@media (max-width: 768px) {
    /* Ocultamos columnas de Clientes, Catálogo y Estado para ganar espacio */
    .usage-table th:nth-child(4), .usage-table td:nth-child(4),
    .usage-table th:nth-child(5), .usage-table td:nth-child(5),
    .usage-table th:nth-child(7), .usage-table td:nth-child(7) {
        display: none;
    }

    /* Reducimos el padding y la fuente para que el resto quepa bien */
    .usage-table td, .usage-table th {
        padding: 10px 5px !important;
        font-size: 0.75rem !important;
    }

    .money-highlight {
        font-size: 0.75rem !important;
    }

    /* Evitamos que nombres de empresa muy largos empujen las columnas */
    .usage-table td:nth-child(2) {
        max-width: 90px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
}
  </style>
</head>
<body>

<div class="layout">
  <div id="sidebar"></div>
  <div class="content">
    <div id="header"></div>

    <div class="page" style="padding: 25px; background: #f8fafc; min-height: calc(100vh - 70px);">
      <div class="page-header" style="margin-bottom: 20px;">
        <h1 style="margin: 0; color: #1e293b; font-weight: 800;"><i class="bi bi-bar-chart-line-fill" style="color: #f59e0b;"></i> Ranking y Uso del Sistema</h1>
        <p style="color: #64748b; margin-top: 5px;">Descubre qué clientes utilizan más la plataforma y analiza su volumen de transacciones.</p>
      </div>

      <div class="card" style="background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow-x: auto; border: 1px solid #e2e8f0;">
        <table class="usage-table" id="usage-table" style="width: 100%; border-collapse: collapse; text-align: left;">
          <thead>
            <tr>
              <th>Ranking</th>
              <th>Empresa</th>
              <th style="text-align: center;">Pedidos Creados</th>
              <th style="text-align: center;">Clientes Registrados</th>
              <th style="text-align: center;">Productos en Catálogo</th>
              <th style="text-align: right;">Volumen Procesado ($)</th>
              <th style="text-align: center;">Estado</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="7" style="text-align: center; padding: 20px;"><i class="bi bi-arrow-repeat spin"></i> Cargando analíticas...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/superadmin_reportes.js"></script>

</body>
</html>
