<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión | Sistema SaaS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* Fondo con gradiente oscuro y animado */
    body {
      margin: 0; 
      padding: 0; 
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh;
      color: #ffffff;
      overflow: hidden;
      position: relative;
    }

    /* Elementos decorativos flotantes de fondo */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
    }
    body::before {
      background: rgba(59, 130, 246, 0.4); /* Azul cyber */
      top: -50px;
      left: -50px;
    }
    body::after {
      background: rgba(139, 92, 246, 0.4); /* Púrpura */
      bottom: -50px;
      right: -50px;
    }

    /* Tarjeta Glassmorphism (Cristal) */
    .login-container {
      background: rgba(255, 255, 255, 0.05); /* Transparencia */
      backdrop-filter: blur(15px); /* Efecto cristal */
      -webkit-backdrop-filter: blur(15px);
      padding: 45px 40px; 
      border-radius: 24px; 
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 100%; 
      max-width: 420px; 
      text-align: center;
      z-index: 1; /* Para que esté por encima de las luces */
      transition: transform 0.3s ease;
    }

    .login-container:hover {
      transform: translateY(-5px);
    }

    /* Logo futurista */
    .login-logo {
      width: 70px; 
      height: 70px; 
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white; 
      border-radius: 18px;
      display: flex; 
      justify-content: center; 
      align-items: center; 
      font-size: 2rem; 
      margin: 0 auto 25px;
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
    }

    h1 { margin: 0 0 8px; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px; }
    p { margin: 0 0 30px; color: #94a3b8; font-size: 0.95rem; }
    
    .form-group { display: flex; flex-direction: column; text-align: left; margin-bottom: 20px; }
    .form-group label { font-weight: 600; color: #cbd5e1; font-size: 0.85rem; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase;}
    
    /* Inputs modernos y translúcidos */
    .form-group input { 
      padding: 14px 16px; 
      background: rgba(0, 0, 0, 0.2);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.1); 
      border-radius: 12px; 
      font-size: 1rem; 
      outline: none; 
      transition: all 0.3s ease; 
    }
    
    .form-group input::placeholder { color: #64748b; }
    
    .form-group input:focus { 
      border-color: #3b82f6; 
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); 
    }
    
    /* Botón vibrante */
    .btn-login {
      width: 100%; 
      padding: 16px; 
      background: linear-gradient(to right, #3b82f6, #6366f1); 
      color: white; 
      border: none; 
      border-radius: 12px;
      font-size: 1.05rem; 
      font-weight: 700; 
      cursor: pointer; 
      margin-top: 15px; 
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }
    
    .btn-login:hover { 
      background: linear-gradient(to right, #2563eb, #4f46e5); 
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
      transform: translateY(-2px);
    }
    
    .error-msg { 
      color: #fca5a5; 
      background: rgba(220, 38, 38, 0.2); 
      border: 1px solid rgba(220, 38, 38, 0.3);
      padding: 12px; 
      border-radius: 10px; 
      font-size: 0.9rem; 
      display: none; 
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-logo"><i class="bi bi-box-seam"></i></div>
    <h1>Bienvenido</h1>
    <p>Accede a tu plataforma de gestión central</p>

    <div id="error-box" class="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" id="email" placeholder="usuario@empresa.com" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login" id="btn-submit">Ingresar al Sistema</button>
    </form>
  </div>

  <script src="../assets/js/login.js"></script>
</body>
</html>
