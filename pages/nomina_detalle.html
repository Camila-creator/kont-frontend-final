<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle Nómina | Kont Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .back-link { display:inline-flex;align-items:center;gap:6px;color:#64748b;font-size:13px;font-weight:600;text-decoration:none;margin-bottom:16px; }
    .back-link:hover { color:#0f172a; }
    .period-header { background:white;border:1px solid #e2e8f0;border-radius:14px;padding:20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px; }
    .period-title { font-size:1.2rem;font-weight:800;color:#0f172a; }
    .period-meta { font-size:12px;color:#64748b;margin-top:2px; }
    .totals-bar { display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px; }
    .total-card { background:white;border:1px solid #e2e8f0;border-radius:10px;padding:12px 16px; }
    .total-label { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:3px; }
    .total-value { font-size:1.2rem;font-weight:800; }
    .payroll-table { width:100%;border-collapse:collapse;font-size:12px; }
    .payroll-table th { padding:8px 10px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#64748b;border-bottom:1px solid #e2e8f0;white-space:nowrap; }
    .payroll-table th:first-child { text-align:left; }
    .payroll-table td { padding:8px 10px;border-bottom:1px solid #f1f5f9;text-align:right;color:#1e293b;vertical-align:middle; }
    .payroll-table td:first-child { text-align:left; }
    .payroll-table tr:hover td { background:#f8fafc; }
    .editable { background:transparent;border:none;width:72px;text-align:right;font-size:12px;color:#1e293b;padding:2px 4px;border-radius:4px; }
    .editable:focus { background:#eff6ff;outline:none;border:1px solid #3b82f6; }
    .badge-deduction { color:#dc2626;font-size:11px; }
    .net-value { font-weight:800;color:#16a34a; }
    .btn-sm { padding:5px 10px;font-size:12px;border-radius:7px;border:1px solid #e2e8f0;background:white;color:#475569;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:600;transition:all .15s; }
    .btn-sm:hover { background:#f8fafc; }
    .btn-sm.primary { background:#0f172a;color:white;border-color:#0f172a; }
    .btn-sm.green { background:#16a34a;color:white;border-color:#16a34a; }
    .alert-info { background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;font-size:12px;color:#1d4ed8;margin-bottom:16px; }
    .alert-warning { background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#b45309;margin-bottom:16px; }

    /* --- FIX MODAL KONT (Para tapar el Header) --- */
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(15, 23, 42, 0.7) !important;
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999 !important;
        padding: 20px;
    }
    .modal.hidden { display: none !important; }
    .modal-content {
        background: white;
        width: 100%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        position: relative;
    }
  </style>
</head>
<body>
<div class="layout">
  <div id="sidebar"></div>
  <div class="content">
    <div id="header"></div>
    <main class="main-content">

      <a href="nomina.html" class="back-link"><i class="bi bi-arrow-left-circle"></i> Volver a Nómina</a>

      <div id="main-content">
        <p style="color:#94a3b8;text-align:center;padding:40px;">Cargando...</p>
      </div>

    </main>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/nomina_detalle.js"></script>
</body>
</html>
