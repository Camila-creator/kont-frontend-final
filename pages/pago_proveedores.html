<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pagos a Proveedores | Kont Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="../assets/js/kont-excel.js"></script>

  <style>
    /* --- KONT ADMIN DESIGN SYSTEM (PROVEEDORES) --- */
    :root {
      --primary-red: #ef4444;
      --dark-red: #b91c1c;
      --bg-slate: #f8fafc;
      --border-soft: #e2e8f0;
      --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
      --shadow-premium: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    body { background-color: var(--bg-slate); color: #1e293b; font-family: 'Poppins', sans-serif; }

    /* --- LAYOUT & TOP BAR MODERN DESIGN --- */
    .top-bar { 
      display: flex; justify-content: space-between; align-items: center; 
      margin-bottom: 25px; gap: 15px; flex-wrap: wrap; 
      background: white; padding: 18px; border-radius: var(--radius-lg); 
      border: 1px solid var(--border-soft); box-shadow: var(--shadow-soft);
    }
    
    .search-box { 
      display: flex; align-items: center; background: #f1f5f9; 
      border: 1px solid var(--border-soft); border-radius: 10px; padding: 8px 16px; 
      flex-grow: 1; max-width: 500px; transition: border 0.3s;
    }
    .search-box:focus-within { border-color: var(--primary-red); background: white; }
    .search-box i { color: #94a3b8; margin-right: 12px; font-size: 1.1rem; }
    .search-box input { border: none; outline: none; width: 100%; background: transparent; font-size: 0.95rem; color: #1e293b; }

    /* --- FORMULARIO Y PANELES KONT --- */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-weight: 700; color: #475569; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.025em; }
    .form-group select, .form-group input { 
      padding: 12px; border: 1.5px solid var(--border-soft); border-radius: 10px; 
      font-size: 0.95rem; outline: none; transition: border 0.2s; background: var(--bg-slate);
    }
    .form-group select:focus, .form-group input:focus { border-color: var(--primary-red); background: white; }

    .bank-panel { background: #fff1f2; border: 2px dashed #fecaca; border-radius: 12px; padding: 18px; margin-bottom: 20px; transition: transform 0.2s; }
    .bank-panel label { color: #9f1239; font-weight: 800; display: block; margin-bottom: 10px; font-size: 0.85rem; }
    .bank-panel select { width: 100%; padding: 12px; border: 1.5px solid #fda4af; border-radius: 8px; background: white; color: #be123c; font-weight: 600; }

    /* --- TABLA PREMIUM CON MODERN DESIGN --- */
    .card-table-wrapper { background: white; border-radius: var(--radius-lg); border: 1px solid var(--border-soft); box-shadow: var(--shadow-premium); overflow-x: auto; padding: 0; }
    .money-col { text-align: right; font-variant-numeric: tabular-nums; font-weight: 800; }
    .money-out { color: #dc2626; } 
    
    .badge-method { background: #f1f5f9; color: #475569; padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; border: 1px solid #cbd5e1; }
    .badge-purchase { background: #fee2e2; color: #b91c1c; padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; border: 1px solid #fecaca; }

    /* --- UNIFICADO MODAL DESIGN (SIN CORTES) --- */
    .modal-content {
        max-width: 550px !important;
        border-radius: var(--radius-xl) !important;
        padding: 0 !important;
        overflow: hidden !important;
        display: flex !important;
        flex-direction: column !important;
        background: white !important;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
    }

    #modal-title {
        padding: 25px !important;
        margin: 0 !important;
        border-bottom: 1px solid #f1f5f9;
        font-size: 1.5rem !important;
        font-weight: 800 !important;
        color: #0f172a !important;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
    }

    /* Nueva estructura para scroll interno */
    #supp-payment-form {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
    }

    .form-scroll-area {
        overflow-y: auto;
        padding: 30px;
        flex: 1;
        -webkit-overflow-scrolling: touch;
    }

    .modal-actions {
        padding: 20px 30px !important;
        background: #f8fafc !important;
        border-top: 1px solid #f1f5f9;
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: auto;
        flex-shrink: 0;
    }

    /* --- OPTIMIZACIONES MOBILE PARA EGRESOS (PROVEEDORES) --- */
    @media (max-width: 768px) {
        /* 1. Reset de página para evitar baile lateral */
        .page { padding: 10px !important; }

        /* 2. Convertir Tabla de Egresos en Tarjetas */
        #supp-payments-table thead { display: none; }
        #supp-payments-table tbody tr {
            display: block;
            background: white;
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-lg);
            margin-bottom: 15px;
            padding: 15px;
            box-shadow: var(--shadow-soft);
        }
        #supp-payments-table td {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        #supp-payments-table td::before { 
          content: attr(data-label);
          font-weight: 700;
          color: #94a3b8;
          font-size: 0.75rem;
          text-transform: uppercase;
        }

        /* 3. EL MODAL: Bloqueo de altura y scroll interno */
        .modal-content {
            width: 94% !important;
            max-width: 94% !important;
            height: auto !important;
            max-height: 90vh !important; /* Evita que choque con los bordes del cel */
            margin: 0 !important;
            border-radius: 24px !important;
        }

        #modal-title {
            padding: 20px !important;
            font-size: 1.25rem !important; /* Un poco más pequeño para móviles */
            flex-shrink: 0 !important;
        }

        .form-scroll-area {
            padding: 20px !important; /* Menos espacio que en PC para ganar área */
            flex: 1 !important;
            overflow-y: auto !important;
        }

        /* 4. Formulario en una sola columna */
        .form-grid {
            display: flex !important;
            flex-direction: column !important;
            gap: 12px !important;
        }

        .form-group input, .form-group select {
            height: 48px !important; /* Altura táctil ideal */
            font-size: 16px !important; /* Evita zoom en iPhone */
        }

        /* 5. Botones móviles */
        .modal-actions {
            flex-direction: column-reverse !important;
            padding: 15px 20px !important;
            gap: 10px !important;
            flex-shrink: 0 !important;
        }

        .modal-actions button {
            width: 100% !important;
            height: 52px !important;
            border-radius: 14px !important;
            margin: 0 !important;
            font-size: 1rem !important;
        }
    }
  </style>
</head>
<body>

<div class="layout">
  <div id="sidebar"></div>
  <div class="content">
    <div id="header"></div>

    <div class="page" style="padding: 25px;">
      <div class="page-header" style="margin-bottom: 25px;">
        <h1 style="font-weight: 900; color: #0f172a;">📤 Pagos a Proveedores</h1>
        <p style="color: #64748b; margin-top: 5px;">Historial de egresos y facturas pendientes del sistema.</p>
      </div>

      <div class="top-bar">
        <div class="search-box">
          <i class="bi bi-search"></i>
          <input id="search-supplier" type="text" placeholder="Buscar por proveedor, método o ID...">
        </div>
        <button id="btn-new-supp-payment" class="btn-danger" style="border-radius: 12px; padding: 12px 20px; font-weight: 700; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);">
          <i class="bi bi-plus-lg"></i> Registrar Pago
        </button>
      </div>

      <div class="card-table-wrapper">
        <table class="table" id="supp-payments-table" style="width: 100%; border-collapse: collapse; text-align: left;">
          <thead style="background: #f8fafc; color: #475569; font-size: 0.8rem; text-transform: uppercase;">
            <tr>
              <th style="padding: 18px;">ID Pago</th>
              <th style="padding: 18px;">Fecha / Hora</th>
              <th style="padding: 18px;">Proveedor</th>
              <th style="padding: 18px; text-align: center;">Factura / Compra</th>
              <th style="padding: 18px;">Método</th>
              <th style="padding: 18px;">Cuenta Origen</th>
              <th style="padding: 18px;">Nro. Referencia</th>
              <th class="money-col" style="padding: 18px;">Monto Pagado</th>
            </tr>
          </thead>
          <tbody style="color: #334155;">
            </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal hidden" id="supp-payment-modal">
  <div class="modal-content">
    <h2 id="modal-title">
      <div style="background: #fff1f2; padding: 10px; border-radius: 10px; display: flex;">
        <i class="bi bi-wallet2" style="color: #ef4444;"></i>
      </div>
      <span>Registrar Egreso</span>
    </h2>
    
    <form id="supp-payment-form">
      <div class="form-scroll-area">
        <input type="hidden" id="supp-payment-id">
        
        <div class="form-group" style="margin-bottom: 15px;">
          <label>Proveedor (A quién le pagamos) *</label>
          <select id="supp-payment-supplier" required><option value="">Cargando...</option></select>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
          <label>Factura o Compra Vinculada *</label>
          <select id="supp-payment-purchase" required><option value="">Selecciona proveedor primero...</option></select>
        </div>

        <div class="bank-panel">
          <label><i class="bi bi-bank2"></i> Cuenta de Origen *</label>
          <select id="supp-payment-account" required><option value="">Cargando...</option></select>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Monto a Pagar ($) *</label>
            <input type="number" step="0.01" id="supp-payment-amount" required style="font-weight: 800; color: #dc2626; font-size: 1.1rem;">
          </div>
          <div class="form-group">
            <label>Método de Pago *</label>
            <select id="supp-payment-method" required>
              <option value="TRANSFERENCIA">Transferencia</option>
              <option value="PAGO_MOVIL">Pago Móvil</option>
              <option value="EFECTIVO">Efectivo</option>
              <option value="BINANCE">Binance</option>
            </select>
          </div>
          <div class="form-group">
            <label>Nro Referencia</label>
            <input type="text" id="supp-payment-ref" placeholder="Ej: #1234">
          </div>
          <div class="form-group">
            <label>Fecha del Pago *</label>
            <input type="date" id="supp-payment-date" required>
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" id="btn-cancel" class="btn-secondary" style="border-radius: 10px;">Cancelar</button>
        <button type="submit" class="btn-danger" style="border-radius: 10px; font-weight: 700;">Registrar Egreso</button>
      </div>
    </form>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/pago_proveedores.js"></script>
</body>
</html>
