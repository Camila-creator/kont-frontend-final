<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conciliación Bancaria | Kont Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; gap:12px; flex-wrap:wrap; }
    .recon-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
    .recon-card { background:white; border:1px solid #e2e8f0; border-radius:14px; padding:18px; transition:box-shadow .2s; }
    .recon-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.07); }
    .recon-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
    .recon-bank { font-size:1rem; font-weight:700; color:#0f172a; }
    .recon-period { font-size:12px; color:#64748b; margin-top:2px; }
    .progress-bar { height:6px; background:#f1f5f9; border-radius:4px; margin-bottom:10px; overflow:hidden; }
    .progress-fill { height:100%; background:#16a34a; border-radius:4px; transition:width .3s; }
    .recon-stats { display:flex; gap:12px; font-size:11px; margin-bottom:14px; }
    .stat-green { color:#16a34a; font-weight:700; }
    .stat-red { color:#dc2626; font-weight:700; }
    .stat-gray { color:#94a3b8; }
    .badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; }
    .badge-proceso { background:#eff6ff; color:#1d4ed8; }
    .badge-cerrado { background:#f1f5f9; color:#475569; }
    .btn-sm { padding:5px 10px; font-size:12px; border-radius:7px; border:1px solid #e2e8f0; background:white; color:#475569; cursor:pointer; display:inline-flex; align-items:center; gap:4px; font-weight:600; transition:all .15s; }
    .btn-sm:hover { background:#f8fafc; }
    .btn-sm.primary { background:#0f172a; color:white; border-color:#0f172a; }
    .empty { text-align:center; padding:60px; color:#94a3b8; grid-column:1/-1; }
    .empty i { font-size:2.5rem; display:block; margin-bottom:10px; }
    
    /* --- FIX MODAL KONT (Para tapar el Header) --- */
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(15, 23, 42, 0.7) !important;
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999 !important; /* Gana contra el header */
        padding: 20px;
    }
    .modal.hidden { display: none !important; opacity: 0; pointer-events: none; }
    .modal-content {
        background: white;
        width: 100%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        position: relative;
    }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-row.single { grid-template-columns:1fr; }
    @media(max-width:640px) { .form-row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="layout">
  <div id="sidebar"></div>
  <div class="content">
    <div id="header"></div>
    <main class="main-content">

      <div class="top-bar">
        <h2 style="margin:0;font-size:1.3rem;font-weight:800;color:#0f172a;">Conciliación Bancaria</h2>
        <button class="btn-sm primary" onclick="openNewModal()">
          <i class="bi bi-plus-lg"></i> Nueva conciliación
        </button>
      </div>

      <div class="recon-grid" id="recon-grid">
        <div class="empty"><i class="bi bi-bank"></i>Cargando conciliaciones...</div>
      </div>

    </main>
  </div>
</div>

<div class="modal hidden" id="new-modal">
  <div class="modal-content" style="max-width:460px;">
    <h2>Nueva Conciliación</h2>
    <div id="new-error" class="error-msg" style="display:none;"></div>
    <div class="form-group">
      <label class="form-label">Cuenta bancaria *</label>
      <select class="form-input" id="new-account">
        <option value="">Seleccionar cuenta...</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Período (etiqueta)</label>
      <input class="form-input" id="new-period" placeholder="ENE 2026, Mar 2026...">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group"><label class="form-label">Fecha inicio *</label><input class="form-input" id="new-start" type="date"></div>
      <div class="form-group"><label class="form-label">Fecha fin *</label><input class="form-input" id="new-end" type="date"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Saldo inicial (extracto del banco)</label>
      <input class="form-input" id="new-balance" type="number" step="0.01" placeholder="0.00">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeNewModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveNew()"><i class="bi bi-check-lg"></i> Crear</button>
    </div>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/conciliacion.js"></script>
</body>
</html>
