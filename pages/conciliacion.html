<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conciliación Bancaria | Kont Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    /* =========================================================
       LAYOUT & TOP BAR
       ========================================================= */
    .top-bar { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 24px; 
        gap: 12px; 
        flex-wrap: wrap; 
    }

    /* =========================================================
       GRID DE CONCILIACIONES (Cards)
       ========================================================= */
    .recon-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); 
        gap: 20px; 
    }

    .recon-card { 
        background: white; 
        border: 1px solid #e2e8f0; 
        border-radius: 16px; 
        padding: 20px; 
        transition: all 0.2s ease;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .recon-card:hover { 
        transform: translateY(-3px);
        box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.05); 
        border-color: #cbd5e1;
    }

    .recon-card-header { 
        display: flex; 
        justify-content: space-between; 
        align-items: flex-start; 
    }

    .recon-bank { font-size: 1.1rem; font-weight: 800; color: #0f172a; }
    .recon-period { font-size: 13px; color: #64748b; font-weight: 500; }

    /* Barra de Progreso */
    .progress-container { margin: 8px 0; }
    .progress-label { 
        display: flex; 
        justify-content: space-between; 
        font-size: 11px; 
        font-weight: 700; 
        text-transform: uppercase; 
        color: #94a3b8;
        margin-bottom: 6px;
    }
    .progress-bar { height: 8px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: #2563eb; border-radius: 10px; transition: width .5s ease; }
    .progress-fill.complete { background: #16a34a; }

    .recon-stats { 
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 12px;
        background: #f8fafc;
        border-radius: 12px;
    }
    .stat-item { display: flex; flex-direction: column; }
    .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 700; }
    .stat-value { font-size: 13px; font-weight: 700; }
    .stat-green { color: #16a34a; }
    .stat-red { color: #dc2626; }

    /* Badges */
    .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-proceso { background: #eff6ff; color: #1d4ed8; }
    .badge-cerrado { background: #f1f5f9; color: #475569; }

    /* Botones */
    .btn-sm { 
        padding: 8px 14px; 
        font-size: 12px; 
        border-radius: 10px; 
        border: 1px solid #e2e8f0; 
        background: white; 
        color: #475569; 
        cursor: pointer; 
        display: inline-flex; 
        align-items: center; 
        gap: 6px; 
        font-weight: 700; 
        transition: all .15s; 
    }
    .btn-sm:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .btn-sm.primary { background: #0f172a; color: white; border-color: #0f172a; }
    .btn-sm.primary:hover { background: #1e293b; }

    .empty { text-align: center; padding: 60px; color: #94a3b8; grid-column: 1/-1; }
    .empty i { font-size: 3rem; display: block; margin-bottom: 12px; opacity: 0.5; }

    /* =========================================================
       SISTEMA GLOBAL DE MODALES - KONT
       ========================================================= */
    .modal {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        background: rgba(15, 23, 42, 0.7); 
        backdrop-filter: blur(4px);
        display: flex; align-items: center; justify-content: center;
        z-index: 9999 !important;
        padding: 20px;
        transition: all 0.3s ease;
    }
    .modal.hidden { display: none !important; opacity: 0; pointer-events: none; }

    .modal-content {
        background: white;
        width: 100%;
        max-width: 480px;
        max-height: 90vh;
        overflow-y: auto;
        padding: 30px;
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        position: relative;
        animation: modalSlideUp 0.3s ease-out;
    }

    @keyframes modalSlideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .modal-content h2 { margin: 0 0 20px 0; font-size: 1.4rem; font-weight: 800; color: #0f172a; }

    /* Forms en Modal */
    .form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; font-weight: 700; color: #64748b; }
    .form-input { 
        padding: 10px 14px; border-radius: 10px; border: 1px solid #e2e8f0; 
        font-size: 14px; transition: all 0.2s; 
    }
    .form-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

    .modal-actions {
        margin-top: 24px; padding-top: 20px;
        border-top: 1px solid #f1f5f9;
        display: flex; justify-content: flex-end; gap: 12px;
    }

    /* =========================================================
       MOBILE QUERIES
       ========================================================= */
    @media (max-width: 640px) {
        .recon-grid { grid-template-columns: 1fr; }
        
        .top-bar { flex-direction: column; align-items: stretch; }
        .top-bar h2 { text-align: center; margin-bottom: 4px; }
        .btn-sm.primary { justify-content: center; padding: 14px; }

        .modal { align-items: flex-end; padding: 0; } /* Estilo Bottom Sheet */
        .modal-content { 
            border-radius: 24px 24px 0 0; 
            max-width: 100%; 
            padding: 24px;
            animation: modalSlideUpMobile 0.3s ease-out;
        }

        @keyframes modalSlideUpMobile {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-actions { flex-direction: column-reverse; }
        .modal-actions button { width: 100%; padding: 14px; }
    }
</style>
</head>
<body>
<div class="layout">
  <div id="sidebar"></div>
  <div class="content">
    <div id="header"></div>
    <main class="main-content">

      <div class="top-bar">
        <h2 style="margin:0;font-size:1.3rem;font-weight:800;color:#0f172a;">Conciliación Bancaria</h2>
        <button class="btn-sm primary" onclick="openNewModal()">
          <i class="bi bi-plus-lg"></i> Nueva conciliación
        </button>
      </div>

      <div class="recon-grid" id="recon-grid">
        <div class="empty"><i class="bi bi-bank"></i>Cargando conciliaciones...</div>
      </div>

    </main>
  </div>
</div>

<div class="modal hidden" id="new-modal">
  <div class="modal-content" style="max-width:460px;">
    <h2>Nueva Conciliación</h2>
    <div id="new-error" class="error-msg" style="display:none;"></div>
    <div class="form-group">
      <label class="form-label">Cuenta bancaria *</label>
      <select class="form-input" id="new-account">
        <option value="">Seleccionar cuenta...</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Período (etiqueta)</label>
      <input class="form-input" id="new-period" placeholder="ENE 2026, Mar 2026...">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group"><label class="form-label">Fecha inicio *</label><input class="form-input" id="new-start" type="date"></div>
      <div class="form-group"><label class="form-label">Fecha fin *</label><input class="form-input" id="new-end" type="date"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Saldo inicial (extracto del banco)</label>
      <input class="form-input" id="new-balance" type="number" step="0.01" placeholder="0.00">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeNewModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveNew()"><i class="bi bi-check-lg"></i> Crear</button>
    </div>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/conciliacion.js"></script>
</body>
</html>
