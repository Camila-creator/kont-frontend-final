<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sedes | Kont Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
  /* --- ESTRUCTURA BASE --- */
  .layout { display: flex; min-height: 100vh; background: #f8fafc; }
  .content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .main-content { padding: 25px; flex: 1; }

  /* --- TOP BAR & BOTONES --- */
  .top-bar { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 24px; 
    gap: 15px; 
    flex-wrap: wrap;
  }
  
  .btn-primary {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
  }
  .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
  .btn-primary:active { transform: scale(0.98); }

  /* --- GRID DE SEDES --- */
  .branch-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
    gap: 20px; 
  }
  
  .branch-card { 
    background: white; 
    border: 1px solid #e2e8f0; 
    border-radius: 16px; 
    padding: 20px; 
    transition: all 0.2s ease;
    position: relative;
  }
  .branch-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
  .branch-card.inactive { opacity: 0.6; background: #f1f5f9; }

  .branch-name { font-size: 1.1rem; font-weight: 700; color: #1e293b; margin-bottom: 10px; display: flex; align-items: center; }
  .branch-info { display: flex; flex-direction: column; gap: 6px; font-size: 0.85rem; color: #64748b; margin-bottom: 15px; }
  .branch-info i { margin-right: 6px; color: #94a3b8; }

  .branch-actions { 
    display: flex; 
    gap: 8px; 
    margin-top: 15px; 
    padding-top: 15px; 
    border-top: 1px solid #f1f5f9; 
  }
  
  /* --- MODAL SISTEMA (Tu código universal mejorado) --- */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.7); 
    backdrop-filter: blur(4px);
    display: none; /* Se activa con .open */
    justify-content: center;
    align-items: center;
    z-index: 2000;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

  .modal {
    background: white;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px;
    border-radius: 20px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    position: relative;
    animation: modalSlideUp 0.3s ease-out;
  }

  /* Estilos para el formulario dentro del modal */

.form-group {
    margin-bottom: 16px;
    text-align: left; /* Asegura que las etiquetas no se centren */
}

.form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #475569; /* Un gris azulado elegante */
    margin-bottom: 6px;
}

.form-group input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.9rem;
    transition: all 0.2s ease;
    outline: none;
    background-color: #f8fafc;
}

.form-group input:focus {
    border-color: #3b82f6; /* Azul brillante al hacer clic */
    background-color: #fff;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

/* Footer con los botones */
.form-footer {
    display: flex;
    justify-content: flex-end; /* Alinea botones a la derecha */
    gap: 12px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #f1f5f9;
}

/* Estilo de botones */
.btn-primary, .btn-secondary {
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
}

.btn-primary {
    background-color: #3b82f6;
    color: white;
}

.btn-primary:hover {
    background-color: #2563eb;
}

.btn-primary:disabled {
    background-color: #94a3b8;
    cursor: not-allowed;
}

.btn-secondary {
    background-color: #f1f5f9;
    color: #475569;
}

.btn-secondary:hover {
    background-color: #e2e8f0;
}

/* Mensaje de error interno */
.error-msg {
    background-color: #fef2f2;
    color: #dc2626;
    padding: 10px;
    border-radius: 6px;
    font-size: 0.85rem;
    margin-bottom: 15px;
    display: none; /* Se activa desde JS */
    border-left: 4px solid #dc2626;
}

  @keyframes modalSlideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid #e2e8f0;
  }

  .modal-title { font-size: 1.25rem; font-weight: 800; color: #1e293b; }

  /* --- FORMULARIOS --- */
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .form-group label { font-size: 0.85rem; font-weight: 600; color: #475569; }
  .form-group input { 
    padding: 12px; 
    border: 1px solid #cbd5e1; 
    border-radius: 10px; 
    font-size: 0.95rem; 
    outline: none; 
    transition: border 0.2s;
  }
  .form-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

  .form-footer { 
    margin-top: 25px; 
    padding-top: 15px; 
    border-top: 1px solid #e2e8f0; 
    display: flex; 
    justify-content: flex-end; 
    gap: 12px; 
  }

  /* --- RESPONSIVE --- */
  @media (max-width: 640px) {
    .main-content { padding: 15px; }
    .top-bar { flex-direction: column; align-items: stretch; }
    .branch-grid { grid-template-columns: 1fr; }
    .modal { padding: 20px; }
    .form-footer { flex-direction: column-reverse; }
    .form-footer button { width: 100%; }
  }

  /* Utilidades */
  .error-msg { 
    background: #fee2e2; 
    color: #dc2626; 
    padding: 12px; 
    border-radius: 10px; 
    font-size: 0.85rem; 
    margin-bottom: 15px; 
    display: none; 
    border: 1px solid #fecaca;
  }
  .badge-active { background: #dcfce7; color: #16a34a; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
  .badge-inactive { background: #fee2e2; color: #dc2626; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
</style>
</head>
<body>
  <div class="layout">
    <div id="sidebar"></div>
    <div class="content">
      <div id="header"></div>
      <main class="main-content">

        <div class="top-bar">
          <h2 style="margin:0; font-size:1.3rem; color:#1e293b;">Sedes</h2>
          <button class="btn-primary" id="btn-new-branch" onclick="openModal()">
            <i class="bi bi-plus-lg"></i> Nueva Sede
          </button>
        </div>

        <div class="plan-banner" id="plan-banner" style="display:none;">
          <i class="bi bi-buildings"></i>
          <span id="plan-text">Cargando plan...</span>
        </div>

        <div class="branch-grid" id="branches-grid">
          <div class="empty-state">
            <i class="bi bi-buildings"></i>
            <p>Cargando sedes...</p>
          </div>
        </div>

      </main>
    </div>
  </div>

  <div class="modal-overlay" id="branch-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Nueva Sede</span>
        <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;color:#64748b;">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div class="error-msg" id="modal-error"></div>
      
      <div class="form-group">
        <label>Nombre de la sede *</label>
        <input type="text" id="branch-name" placeholder="Ej: Sede Principal, Sucursal Este..." maxlength="100">
      </div>
      
      <div class="form-group">
        <label>Dirección</label>
        <input type="text" id="branch-address" placeholder="Dirección física (opcional)">
      </div>
      
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" id="branch-phone" placeholder="Número de contacto (opcional)">
      </div>
      
      <input type="hidden" id="branch-id"> <div class="form-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn-primary" id="btn-save-branch" onclick="saveBranch()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/sedes.js"></script>
</body>
</html>
