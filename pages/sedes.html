<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sedes | Kont Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
   /* Estructura Base para evitar que todo esté de lado */
    .layout { display: flex; min-height: 100vh; background: #f8fafc; }
    .content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .main-content { padding: 25px; flex: 1; }

    /* Top Bar y Botón Nueva Sede */
    .top-bar { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 24px; 
      gap: 15px; 
    }
    
    #btn-new-branch {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    #btn-new-branch:active { transform: scale(0.95); }

    /* Banner del Plan */
    .plan-banner { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      background: #eff6ff; 
      border: 1px solid #dbeafe; 
      border-radius: 12px; 
      padding: 12px 16px; 
      font-size: 0.85rem; 
      color: #1e40af; 
      margin-bottom: 20px; 
    }

    /* Grid de Sedes */
    .branch-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
      gap: 20px; 
    }
    .branch-card { 
      background: white; 
      border: 1px solid #e2e8f0; 
      border-radius: 16px; 
      padding: 20px; 
      transition: all 0.2s ease;
    }
    .branch-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

    /* Modal - Corregido el centrado y visibilidad */
    .modal-overlay { 
      display: none; 
      position: fixed; 
      inset: 0; 
      background: rgba(15, 23, 42, 0.6); 
      backdrop-filter: blur(4px);
      z-index: 9999; 
      align-items: center; 
      justify-content: center; 
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    
    .modal { 
      background: white; 
      border-radius: 20px; 
      padding: 30px; 
      width: 100%; 
      max-width: 480px; 
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      position: relative;
    }

    /* Formulario */
    .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; font-weight: 600; color: #475569; }
    .form-group input { 
      width: 100%;
      border: 1px solid #cbd5e1; 
      border-radius: 10px; 
      padding: 12px; 
      font-size: 0.95rem; 
      box-sizing: border-box; /* Crucial para que el padding no rompa el ancho */
    }

    /* Query para Teléfonos */
    @media (max-width: 640px) {
      .main-content { padding: 15px; }
      .top-bar { flex-direction: column; align-items: flex-start; }
      #btn-new-branch { width: 100%; justify-content: center; }
      .branch-grid { grid-template-columns: 1fr; }
      .modal { padding: 20px; border-radius: 15px; }
      .form-footer { flex-direction: column; }
      .form-footer button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div id="sidebar"></div>
    <div class="content">
      <div id="header"></div>
      <main class="main-content">

        <div class="top-bar">
          <h2 style="margin:0; font-size:1.3rem; color:#1e293b;">Sedes</h2>
          <button class="btn-primary" id="btn-new-branch" onclick="openModal()">
            <i class="bi bi-plus-lg"></i> Nueva Sede
          </button>
        </div>

        <div class="plan-banner" id="plan-banner" style="display:none;">
          <i class="bi bi-buildings"></i>
          <span id="plan-text">Cargando plan...</span>
        </div>

        <div class="branch-grid" id="branches-grid">
          <div class="empty-state">
            <i class="bi bi-buildings"></i>
            <p>Cargando sedes...</p>
          </div>
        </div>

      </main>
    </div>
  </div>

  <div class="modal-overlay" id="branch-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Nueva Sede</span>
        <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;color:#64748b;">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div class="error-msg" id="modal-error"></div>
      
      <div class="form-group">
        <label>Nombre de la sede *</label>
        <input type="text" id="branch-name" placeholder="Ej: Sede Principal, Sucursal Este..." maxlength="100">
      </div>
      
      <div class="form-group">
        <label>Dirección</label>
        <input type="text" id="branch-address" placeholder="Dirección física (opcional)">
      </div>
      
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" id="branch-phone" placeholder="Número de contacto (opcional)">
      </div>
      
      <input type="hidden" id="branch-id"> <div class="form-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn-primary" id="btn-save-branch" onclick="saveBranch()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/sedes.js"></script>
</body>
</html>
