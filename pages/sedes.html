<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sedes | Kont Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* --- ESTRUCTURA Y GRID --- */
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 15px; flex-wrap: wrap; }

    .plan-info-bar {
      display: flex; align-items: center; gap: 10px;
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: 10px; padding: 10px 16px;
      font-size: 0.82rem; color: #1d4ed8; margin-bottom: 20px;
    }
    .plan-info-bar i { font-size: 1rem; }

    .branch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
    }

    .branch-card {
      background: white; border: 1px solid #e2e8f0;
      border-radius: 14px; padding: 18px;
      transition: box-shadow 0.2s;
    }
    .branch-card:hover { box-shadow: 0 6px 16px rgba(0,0,0,0.07); }
    .branch-card.inactive { opacity: 0.55; }

    .branch-name { font-size: 1.1rem; font-weight: 700; color: #0f172a; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    .branch-info { display: flex; flex-direction: column; gap: 6px; font-size: 0.85rem; color: #64748b; margin-bottom: 16px; }
    .branch-info i { margin-right: 6px; color: #94a3b8; }

    .branch-actions { display: flex; gap: 8px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #f1f5f9; }

    .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; grid-column: 1 / -1; }
    .empty-state i { font-size: 3rem; margin-bottom: 16px; display: block; opacity: 0.5; }

    /* --- ESTILOS DEL FORMULARIO DENTRO DEL MODAL --- */
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .form-input { 
      width: 100%; 
      padding: 10px 12px; 
      border: 1px solid #cbd5e1; 
      border-radius: 8px; 
      font-size: 0.95rem; 
      outline: none; 
      box-sizing: border-box; 
      transition: border 0.2s;
      background-color: #f8fafc;
    }
    .form-input:focus { border-color: #3b82f6; background-color: #fff; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
  </style>
</head>
<body>
  <div class="layout">
    <div id="sidebar"></div>
    <div class="content">
      <div id="header"></div>
      <main class="main-content">

        <div class="top-bar">
          <h2 style="margin:0; font-size:1.5rem; font-weight:800; color:#0f172a;">Gestión de Sedes</h2>
          <button class="btn-primary" id="btn-new-branch" onclick="openModal()">
            <i class="bi bi-plus-lg"></i> Nueva Sede
          </button>
        </div>

        <div class="plan-info-bar" id="plan-banner" style="display:none;">
          <i class="bi bi-info-circle-fill"></i>
          <span id="plan-text">Cargando información del plan...</span>
        </div>

        <div class="branch-grid" id="branches-grid">
          <div class="empty-state">
            <i class="bi bi-buildings"></i>
            <p>Cargando sedes...</p>
          </div>
        </div>

      </main>
    </div>
  </div>

  <div class="modal hidden" id="branch-modal">
    <div class="modal-content">
      <h2 id="modal-title">Nueva Sede</h2>

      <div id="modal-error" style="display:none; background:#fef2f2; color:#dc2626; border-left:4px solid #dc2626; border-radius:8px; padding:10px 14px; font-size:0.85rem; margin-bottom:14px;"></div>

      <div class="form-group">
        <label class="form-label">Nombre de la sede <span style="color:#dc2626;">*</span></label>
        <input class="form-input" type="text" id="branch-name" placeholder="Ej: Sede Principal, Sucursal Este..." maxlength="100">
      </div>

      <div class="form-group">
        <label class="form-label">Dirección</label>
        <input class="form-input" type="text" id="branch-address" placeholder="Dirección física (opcional)">
      </div>

      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input class="form-input" type="text" id="branch-phone" placeholder="Número de contacto (opcional)">
      </div>

      <input type="hidden" id="branch-id">

      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn-primary" id="btn-save-branch" onclick="saveBranch()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/sedes.js"></script>
</body>
</html>
