<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios | Kont Admin </title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; flex-wrap: wrap;}
    .search-box { display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px 15px; flex-grow: 1; max-width: 400px; }
    .search-box i { color: #94a3b8; margin-right: 10px; }
    .search-box input { border: none; outline: none; width: 100%; padding: 8px 0; font-size: 0.95rem; }

    /* Badges para Módulos */
    .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; display: inline-block; text-align: center; letter-spacing: 0.5px; text-transform: uppercase;}
    .badge-admin { background: #1e293b; color: #f8fafc; } /* Oscuro para Admin */
    .badge-sales { background: #dcfce7; color: #16a34a; } /* Verde para Ventas */
    .badge-finance { background: #fef08a; color: #854d0e; } /* Amarillo para Finanzas */
    .badge-mkt { background: #fce7f3; color: #db2777; } /* Rosa para Marketing */
    .badge-inv { background: #e0f2fe; color: #0284c7; } /* Azul para Almacén */
    .badge-hr { background: #f3e8ff; color: #9333ea; } /* Morado para RRHH */
    
    .badge-inactive { background: #fee2e2; color: #dc2626; } 
    .badge-coord { background: #fef3c7; color: #d97706; border: 1px solid #fcd34d; font-size: 0.65rem; padding: 2px 6px; margin-left: 5px;}

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
    .full-width { grid-column: span 2; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-weight: 600; color: #475569; font-size: 0.85rem; }
    .form-group input, .form-group select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border 0.3s; }
    .form-group input:focus, .form-group select:focus { border-color: #3b82f6; }
    
    /* Estilo del switch de coordinador */
    .coord-box { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px dashed #cbd5e1;}
    .coord-box input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    
    .table-actions { display: flex; gap: 8px; justify-content: center;}
    .btn-icon { padding: 6px 10px; border-radius: 6px; border: none; cursor: pointer; transition: 0.2s; color: white; font-size: 1rem;}
    .btn-edit { background: #3b82f6; } .btn-edit:hover { background: #2563eb; }
    .btn-del { background: #ef4444; } .btn-del:hover { background: #dc2626; }

    @media (max-width: 768px) {
    /* Ajustes de la barra superior */
    .top-bar { flex-direction: column; align-items: stretch; }
    .search-box { max-width: 100%; }

    /* Transformar tabla en lista de tarjetas */
    #users-table thead { display: none; }
    #users-table, #users-table tbody, #users-table tr, #users-table td {
        display: block;
        width: 100%;
    }

    #users-table tr {
        background: white;
        margin-bottom: 10px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        padding: 12px;
        position: relative;
    }

    #users-table td {
        padding: 0 !important;
        border: none !important;
        margin-bottom: 5px;
    }

    /* El nombre y email ocupan el lugar principal */
    #users-table td:first-child {
        margin-bottom: 10px;
    }

    /* El cargo visual en una línea sutil */
    #users-table td:nth-child(2) {
        font-size: 0.85rem;
        color: #64748b;
        font-style: italic;
    }

    /* Los badges de acceso y el estado */
    #users-table td:nth-child(3), 
    #users-table td:nth-child(4) {
        display: inline-block;
        width: auto;
        margin-right: 8px;
    }

    /* Botones de acción flotantes a la derecha */
    #users-table td:last-child {
        position: absolute;
        top: 12px;
        right: 12px;
        width: auto;
    }

    .table-actions {
        flex-direction: column;
        gap: 5px;
    }

    /* Ajuste del modal para móviles */
    .modal-content {
        width: 95% !important;
        padding: 20px !important;
        margin: 10px auto;
    }

    .form-grid { grid-template-columns: 1fr; }
    .full-width { grid-column: span 1; }
}
  </style>
</head>
<body>

<div class="layout">
  <div id="sidebar"></div>
  <div class="content">
    <div id="header"></div>

    <div class="page" style="padding: 25px; background: #f8fafc; min-height: calc(100vh - 70px);">

      <div class="page-header" style="margin-bottom: 20px;">
        <h1 style="margin: 0; color: #1e293b; font-weight: 800;">👥 Equipo y Accesos</h1>
        <p style="color: #64748b; margin-top: 5px;">Gestiona tu personal, asigna cargos y controla lo que pueden ver.</p>
      </div>

      <div class="top-bar">
        <div class="search-box">
          <i class="bi bi-search"></i>
          <input type="text" id="search-user" placeholder="Buscar por nombre o cargo...">
        </div>
        <button id="btn-new-user" class="btn-primary" style="padding: 10px 20px; font-weight: bold; border-radius: 8px; background: #3b82f6;">
          <i class="bi bi-person-plus-fill"></i> Nuevo Usuario
        </button>
      </div>

      <div class="card" style="background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow-x: auto; border: 1px solid #e2e8f0;">
        <table class="table" id="users-table" style="width: 100%; border-collapse: collapse; text-align: left;">
          <thead style="background: #f1f5f9; color: #475569; font-size: 0.85rem; text-transform: uppercase;">
            <tr>
              <th style="padding: 15px;">Empleado</th>
              <th style="padding: 15px;">Cargo (Visual)</th>
              <th style="padding: 15px;">Acceso (Módulo)</th>
              <th style="padding: 15px;">Estado</th>
              <th style="padding: 15px; text-align: center;">Acciones</th>
            </tr>
          </thead>
          <tbody style="color: #334155; font-size: 0.95rem;">
            </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<div class="modal hidden" id="user-modal">
  <div class="modal-content" style="max-width: 600px; border-radius: 16px;">

    <h2 id="modal-title" style="margin-top: 0; color: #1e293b; font-weight: 800; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px;">Registrar Empleado</h2>

    <form id="user-form">
      <input type="hidden" id="user-id">

      <div class="form-grid">
        <div class="form-group full-width">
          <label>Nombre Completo *</label>
          <input type="text" id="user-name" placeholder="Ej. Ana Pérez" required>
        </div>

        <div class="form-group">
          <label>Correo Electrónico (Para Iniciar Sesión) *</label>
          <input type="email" id="user-email" placeholder="ana@empresa.com" required>
        </div>

        <div class="form-group">
          <label>Contraseña <span id="password-hint" style="font-weight: normal; color: #94a3b8; font-size: 0.75rem;"></span></label>
          <input type="password" id="user-password" placeholder="Mínimo 6 caracteres">
        </div>

        <div class="form-group">
          <label>Nombre del Cargo (Visual) *</label>
          <input type="text" id="user-custom-title" placeholder="Ej. Líder de Redes, Cajero Estrella..." required>
        </div>

        <div class="form-group">
          <label>Permisos del Sistema (Módulo) *</label>
          <select id="user-role" required>
            <option value="SALES">Ventas</option>
            <option value="INVENTORY">Almacén</option>
            <option value="MARKETING">Marketing</option>
            <option value="FINANCE">Finanzas</option>
            <option value="HR">Recursos Humanos</option>
            <option value="ADMIN_BRAND">Administrador (Acceso Total)</option>
          </select>
        </div>

        <div class="form-group full-width coord-box" id="coordinator-wrap">
          <input type="checkbox" id="user-is-coordinator">
          <div>
            <label for="user-is-coordinator" style="margin: 0; cursor: pointer; color: #1e293b;">Hacer Coordinador del Área</label>
            <p style="margin: 0; font-size: 0.8rem; color: #64748b;">Le permite ver las métricas generales y reportes de su módulo.</p>
          </div>
        </div>

      </div>

      <div class="modal-actions" style="margin-top: 25px; border-top: 1px solid #e2e8f0; padding-top: 15px;">
        <button type="button" id="btn-cancel" class="btn-secondary" style="border-radius: 8px;">Cancelar</button>
        <button type="submit" class="btn-primary" style="border-radius: 8px; background: #3b82f6;"><i class="bi bi-save"></i> Guardar Empleado</button>
      </div>
    </form>

  </div>
</div>

<div class="modal hidden" id="confirm-modal">
  <div class="modal-content" style="max-width: 400px; text-align: center;">
    <div style="font-size: 3rem; color: #ef4444; margin-bottom: 10px;"><i class="bi bi-exclamation-circle"></i></div>
    <h2 id="confirm-title" style="margin-top: 0;">Confirmar</h2>
    <p id="confirm-message" class="text-soft" style="margin: 10px 0 20px;">¿Estás segura?</p>
    <div class="modal-actions" style="justify-content: center;">
      <button type="button" class="btn-secondary" id="confirm-cancel">No, cancelar</button>
      <button type="button" class="btn-danger" id="confirm-ok">Sí, confirmar</button>
    </div>
  </div>
</div>

<div class="modal hidden" id="alert-modal">
  <div class="modal-content" style="max-width: 400px; text-align: center;">
    <h2 id="alert-title" style="margin-top: 0;">Aviso</h2>
    <p id="alert-message" class="text-soft" style="margin: 10px 0 20px;">Mensaje</p>
    <div class="modal-actions" style="justify-content: center;">
      <button type="button" class="btn-primary" id="alert-ok" style="width: 100%;">Entendido</button>
    </div>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/usuarios.js"></script>

</body>
</html>
