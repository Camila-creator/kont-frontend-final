<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicidad Offline | Kont Admin</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        * { box-sizing: border-box; }
        .offline-layout { padding: 25px; height: calc(100vh - 70px); overflow-y: auto; overflow-x: hidden; }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        /* Dashboard Financiero Básico */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e5e7eb; border-top: 4px solid #8b5cf6; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .metric-value { font-size: 1.8rem; font-weight: 800; color: #1f2937; margin: 5px 0; }
        .metric-label { font-size: 0.85rem; color: #6b7280; text-transform: uppercase; font-weight: 600; }

        /* Grid de Actividades */
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .activity-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: 0.2s; cursor: pointer; display: flex; flex-direction: column; }
        .activity-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.05); }
        .activity-card.finalizado { border-left: 5px solid #10b981; opacity: 0.9; }
        .activity-card.planeado { border-left: 5px solid #f59e0b; }
        .activity-card.ejecucion { border-left: 5px solid #3b82f6; }
        .activity-card.cancelado { border-left: 5px solid #ef4444; opacity: 0.7; }
        
        .act-title { font-size: 1.1rem; font-weight: 800; color: #1f2937; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;}
        .act-badge { font-size: 0.7rem; padding: 4px 8px; border-radius: 6px; font-weight: 700; text-transform: uppercase; white-space: nowrap; }
        
        /* Colores por Categoría */
        .badge-evento { background: #f3e8ff; color: #7e22ce; border: 1px solid #d8b4fe; }
        .badge-impresos { background: #ffedd5; color: #c2410c; border: 1px solid #fdba74; }
        .badge-valla { background: #e0f2fe; color: #0369a1; border: 1px solid #7dd3fc; }
        .badge-merch { background: #fce7f3; color: #be185d; border: 1px solid #f9a8d4; }
        .badge-otro { background: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db; }
        
        .act-data { margin-top: 15px; font-size: 0.9rem; color: #4b5563; border-top: 1px dashed #e5e7eb; padding-top: 10px; }
        .act-row { display: flex; justify-content: space-between; margin-bottom: 5px; }

        /* Modales */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { background: white; width: 95%; max-width: 800px; max-height: 90vh; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; transform: translateY(-20px); transition: 0.3s; }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .modal-header { padding: 20px 30px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; flex-shrink: 0;}
        .modal-tabs { display: flex; border-bottom: 1px solid #e5e7eb; background: #f8fafc; padding: 0 30px; flex-shrink: 0; overflow-x: auto;}
        .tab-btn { padding: 15px 20px; border: none; background: none; font-weight: 600; color: #6b7280; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap;}
        .tab-btn.active { color: #8b5cf6; border-bottom-color: #8b5cf6; }
        
        form { display: flex; flex-direction: column; flex: 1; min-height: 0; }
        .modal-body { padding: 30px; overflow-y: auto; flex: 1; min-height: 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        .modal-footer { padding: 20px 30px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 12px; background: #f8fafc; flex-shrink: 0;}
        
        .form-group { margin-bottom: 18px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { font-size: 0.75rem; font-weight: 700; color: #6b7280; display: block; margin-bottom: 6px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.95rem; }
        input:focus, select:focus, textarea:focus { border-color: #8b5cf6; outline: none; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15); }
        
        .btn-primary { background: #8b5cf6; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s;}
        .btn-primary:hover { background: #7c3aed; }
        .btn-outline { background: transparent; border: 1px solid #d1d5db; color: #4b5563; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Media Query: Publicidad Offline Mobile --- */
@media (max-width: 767px) {
    
    /* 1. Ajuste del Layout General */
    .offline-layout {
        padding: 15px;
        height: auto; /* Dejamos que el scroll sea natural del cuerpo */
    }

    /* 2. Header: Título arriba, botones abajo */
    .header-section {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }

    .header-section div:last-child {
        width: 100%;
        flex-direction: column;
        gap: 10px;
    }

    /* Botón de registrar a ancho completo */
    .btn-primary {
        width: 100%;
        padding: 12px;
        justify-content: center;
        display: flex;
    }

    /* 3. Metrics Grid: 2 columnas para que no ocupen tanto vertical */
    .metrics-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-bottom: 20px;
    }

    /* La primera métrica (Presupuesto) a ancho completo para destacar */
    .metric-card:first-child {
        grid-column: span 2;
    }

    .metric-card {
        padding: 15px;
    }

    .metric-value {
        font-size: 1.4rem;
    }

    .metric-label {
        font-size: 0.7rem;
    }

    /* 4. Activity Cards: Look de Lista Moderna */
    .activity-grid {
        grid-template-columns: 1fr; /* Una por fila */
        gap: 12px;
    }

    .activity-card {
        padding: 16px;
        border-radius: 16px; /* Más redondeado para look moderno */
    }

    .act-title {
        font-size: 1rem;
        flex-direction: column;
        gap: 6px;
    }

    .act-badge {
        align-self: flex-start; /* Badge debajo del nombre */
    }

    /* 5. Modal y Formularios (Optimizado para Pulgar) */
    .modal-box {
        width: 100%;
        height: 100%;
        max-height: 100vh;
        border-radius: 0;
    }

    .modal-header {
        padding: 15px 20px;
    }

    .modal-tabs {
        padding: 0 10px;
        gap: 5px;
    }

    .tab-btn {
        padding: 12px 10px;
        font-size: 0.8rem;
    }

    .modal-body {
        padding: 20px;
    }

    .grid-2 {
        grid-template-columns: 1fr; /* Formulario en una sola columna */
        gap: 0;
    }

    /* Inputs más grandes para facilitar el toque */
    input, select, textarea {
        font-size: 16px !important; /* Evita zoom en iOS */
        padding: 12px;
        margin-bottom: 10px;
    }

    .modal-footer {
        flex-direction: column-reverse; /* Cancelar abajo, Guardar arriba */
        padding: 15px 20px;
    }

    .modal-footer button {
        width: 100%;
        padding: 14px;
    }

    /* 6. Finanzas en Móvil */
    #tab-finanzas div[style*="background:#f8fafc"] {
        padding: 12px;
    }
}
    </style>
</head>
<body>

<div class="layout">
    <div id="sidebar"></div>
    <div class="content">
        <div id="header"></div>

        <div class="offline-layout">
            
            <div class="header-section">
                <div>
                    <h2 style="margin:0;"><i class="bi bi-shop text-primary" style="color:#8b5cf6 !important;"></i> Publicidad Offline & BTL</h2>
                    <p style="color:#6b7280; margin:5px 0 0 0;">Control de eventos, impresos y actividades en el mundo real</p>
                </div>
                <div style="display: flex; gap: 15px;">
                    <select id="filtroMes" class="btn-outline" style="background: white; padding: 8px 15px;" onchange="applyFilters()">
                        <option value="mes_actual">Este Mes</option>
                        <option value="historico">Histórico Total</option>
                    </select>
                    <button class="btn-primary" onclick="openOfflineModal()"><i class="bi bi-plus-lg"></i> Registrar Actividad</button>
                </div>
            </div>

            <div class="metrics-grid">
                <div class="metric-card" style="border-top-color: #f59e0b;">
                    <div class="metric-label">Presupuesto Comprometido</div>
                    <div class="metric-value" id="dashPresupuesto">$ 0.00</div>
                    <small style="color:#6b7280;">Total planeado para actividades</small>
                </div>
                <div class="metric-card" style="border-top-color: #10b981;">
                    <div class="metric-label">Gasto Real Ejecutado</div>
                    <div class="metric-value" id="dashGasto">$ 0.00</div>
                    <small style="color:#10b981;"><i class="bi bi-check-circle"></i> Dinero ya facturado/pagado</small>
                </div>
                <div class="metric-card" style="border-top-color: #3b82f6;">
                    <div class="metric-label">Actividades Activas</div>
                    <div class="metric-value" id="dashActivas">0</div>
                    <small style="color:#6b7280;">En planeación o ejecución</small>
                </div>
            </div>
            
            <div class="activity-grid" id="offlineList">
                </div>

        </div>
    </div>
</div>

<div class="modal-overlay" id="offlineModal">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modalTitle">Detalle de Actividad Offline</h3>
            <button type="button" class="btn-outline" style="border:none; font-size:1.5rem; padding:0;" onclick="closeModal()">&times;</button>
        </div>
        
        <div class="modal-tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'tab-general')">1. Datos Generales</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-finanzas')">2. Estrategia & Finanzas</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-proveedores')">3. Proveedores & Notas</button>
        </div>

        <form id="offlineForm" onsubmit="saveActivity(event)">
            <input type="hidden" id="actId">
            
            <div class="modal-body">
                
                <div id="tab-general" class="tab-content active">
                    <div class="form-group">
                        <label>Nombre de la Actividad / Evento</label>
                        <input type="text" id="actNombre" required placeholder="Ej: Stand en ExpoAgro 2026">
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>Categoría</label>
                            <select id="actCategoria" required>
                                <option value="Evento/Feria">Evento, Feria o Seminario</option>
                                <option value="Valla/Exteriores">Valla Publicitaria / Exteriores</option>
                                <option value="Impresos">Volantes, Afiches o Prensa</option>
                                <option value="Merchandising">Merchandising / Packaging</option>
                                <option value="Patrocinio">Patrocinio</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Estado</label>
                            <select id="actEstado">
                                <option value="Planeado">Planeado 🗓️</option>
                                <option value="En Ejecución">En Ejecución 🚀</option>
                                <option value="Finalizado">Finalizado ✅</option>
                                <option value="Cancelado">Cancelado ❌</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Ubicación Física</label>
                        <input type="text" id="actUbicacion" placeholder="Ej: Centro de Convenciones Carabobo, o Avenida Bolívar">
                    </div>

                    <div class="grid-2">
                        <div class="form-group"><label>Fecha de Inicio (o entrega)</label><input type="date" id="actFechaInicio" required onchange="renderDashboard()"></div>
                        <div class="form-group"><label>Fecha de Finalización</label><input type="date" id="actFechaFin"></div>
                    </div>
                </div>

                <div id="tab-finanzas" class="tab-content">
                    <div class="form-group">
                        <label>Objetivo de esta actividad (¿Por qué lo hacemos?)</label>
                        <textarea id="actObjetivo" rows="2" placeholder="Ej: Captar 50 leads de ganaderos grandes de la zona..."></textarea>
                    </div>

                    <div class="grid-2" style="background:#f8fafc; padding:15px; border-radius:8px; border:1px solid #e5e7eb; margin-bottom:20px;">
                        <div class="form-group" style="margin:0;">
                            <label style="color:#f59e0b;">Presupuesto Estimado ($)</label>
                            <input type="number" step="0.5" id="actPresupuesto" placeholder="0.00" onchange="renderDashboard()">
                        </div>
                        <div class="form-group" style="margin:0;">
                            <label style="color:#10b981;">Gasto Real Final ($)</label>
                            <input type="number" step="0.5" id="actGastoReal" placeholder="0.00" onchange="renderDashboard()">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Resultados Obtenidos (Llenar al finalizar)</label>
                        <textarea id="actResultados" rows="3" placeholder="Ej: Se entregaron 1000 volantes, conseguimos 25 contactos reales..."></textarea>
                    </div>
                </div>

                <div id="tab-proveedores" class="tab-content">
                    <div class="form-group">
                        <label>Agencia / Imprenta / Proveedor Principal</label>
                        <input type="text" id="actProveedor" placeholder="Ej: Impresos Los Llanos C.A.">
                    </div>
                    <div class="form-group">
                        <label>Contacto del Proveedor (Tlf o Email)</label>
                        <input type="text" id="actContacto" placeholder="Ej: 0414-1234567 (Carlos)">
                    </div>
                    <div class="form-group">
                        <label>Enlace a Drive (Fotos, Facturas, Diseños)</label>
                        <input type="url" id="actDriveLink" placeholder="https://drive.google.com/...">
                    </div>
                    <div class="form-group">
                        <label>Notas Adicionales</label>
                        <textarea id="actNotas" rows="3" placeholder="Cualquier eventualidad o detalle de organización..."></textarea>
                    </div>
                </div>

            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn-outline" onclick="closeModal()">Cancelar</button>
                <button type="submit" class="btn-primary"><i class="bi bi-save me-2"></i> Guardar Actividad</button>
            </div>
        </form>
    </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/mkt_offline.js"></script>
</body>
</html>
