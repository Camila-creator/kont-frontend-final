<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos | Kont Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    /* ESTILOS PREMIUM PARA PRODUCTOS */
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; flex-wrap: wrap;}
    .search-box { display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px 15px; flex-grow: 1; max-width: 400px; }
    .search-box i { color: #94a3b8; margin-right: 10px; }
    .search-box input { border: none; outline: none; width: 100%; padding: 8px 0; font-size: 0.95rem; }

    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; display: inline-block; text-align: center; }
    .badge-stock-ok { background: #dcfce7; color: #16a34a; }
    .badge-stock-low { background: #fee2e2; color: #dc2626; animation: pulse 2s infinite; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

    /* Formulario en Grid */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
    .full-width { grid-column: span 2; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-weight: 600; color: #475569; font-size: 0.85rem; }
    .form-group input, .form-group select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.95rem; outline: none; transition: border 0.3s; }
    .form-group input:focus, .form-group select:focus { border-color: #10b981; }
    
    /* Input deshabilitado/Lectura para Kits */
    input:read-only { background-color: #f1f5f9; color: #64748b; cursor: not-allowed; border-color: #e2e8f0; }

    .table-actions { display: flex; gap: 8px; }
    .btn-icon { padding: 6px 10px; border-radius: 6px; border: none; cursor: pointer; transition: 0.2s; color: white; font-size: 1rem;}
    .btn-edit { background: #3b82f6; } .btn-edit:hover { background: #2563eb; }
    .btn-del { background: #ef4444; } .btn-del:hover { background: #dc2626; }
    .btn-recipe { background: #8b5cf6; } .btn-recipe:hover { background: #7c3aed; }

    /* ESTILO SWITCH PARA KITS */
    .switch-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fdf2ff; /* Un toque púrpura suave para diferenciar "Producción" */
      padding: 12px 15px;
      border-radius: 10px;
      border: 1px dashed #d8b4fe;
      margin-bottom: 5px;
    }
    .switch-label { display: flex; align-items: center; gap: 10px; color: #6b21a8; font-weight: 700; font-size: 0.85rem; }
    .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #cbd5e1; transition: .4s; border-radius: 34px;
    }
    .slider:before {
      position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
      background-color: white; transition: .4s; border-radius: 50%;
    }
    input:checked + .slider { background-color: #a855f7; }
    input:checked + .slider:before { transform: translateX(22px); }

    /* =========================================================
   ADAPTACIÓN PARA MÓVIL (PRODUCTOS)
   ========================================================= */
@media (max-width: 768px) {
    /* 1. ESPACIADO Y BUSCADOR CENTRADO */
    .page { padding: 10px !important; }
    
    .top-bar { 
        display: flex; 
        flex-direction: column; 
        gap: 12px; 
        margin-bottom: 20px;
        align-items: center; /* Centra todo el contenido de la barra */
    }

    .search-box { 
        width: 100%; /* Ocupa el ancho pero el contenido interno se alinea */
        max-width: 400px; /* Para que no se vea infinito en pantallas anchas */
        border-radius: 10px; 
        border: 1.5px solid #e2e8f0;
        height: 40px;
        display: flex;
        align-items: center;
    }
    
    .search-box input {
        text-align: center; /* Texto del buscador centrado */
        font-size: 0.9rem;
    }

    /* BOTÓN AZUL KONT CENTRADO */
    #btn-new-product {
        width: 100%;
        max-width: 400px;
        height: 48px;
        background: #3b82f6 !important;
        border-radius: 12px;
        font-weight: 700;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        border: none;
        box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2);
    }

    /* 2. TARJETAS SIN SOBREPOSICIÓN */
    #products-table thead { display: none; }
    #products-table, #products-table tbody, #products-table tr, #products-table td {
        display: block;
        width: 100%;
    }

    #products-table tbody tr {
        background: white;
        margin-bottom: 8px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #edf2f7;
        position: relative;
    }

    /* Fila 1: ID y Precio (Extremos) */
    #products-table td:nth-child(1) { 
        color: #3b82f6; 
        font-size: 0.65rem; 
        font-weight: 800;
        margin-bottom: 2px;
    }
    
    #products-table td:nth-child(5) { 
        position: absolute;
        top: 12px;
        right: 12px;
        font-size: 1.1rem;
        font-weight: 800;
        color: #1e293b;
        width: auto;
    }

    /* Fila 2: Nombre (Largo) */
    #products-table td:nth-child(2) { 
        font-size: 0.95rem; 
        font-weight: 700; 
        color: #1e293b;
        margin-bottom: 4px;
        padding-right: 80px; /* Espacio para que no choque con el precio */
    }

    /* Fila 3: Meta info (Categoría y Proveedor) */
    #products-table td:nth-child(3), 
    #products-table td:nth-child(4) { 
        display: inline-block;
        font-size: 0.75rem;
        color: #64748b;
        width: auto;
        margin-right: 10px;
    }

    /* Fila 4: Stock y Acciones */
    #products-table td:nth-child(7) { 
        margin-top: 8px;
        width: auto;
        display: inline-block;
    }

    #products-table td:last-child {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #f1f5f9;
        display: flex;
        justify-content: space-between; /* Botones repartidos */
    }

    .btn-icon {
        flex: 1;
        text-align: center;
        font-size: 1.1rem;
        padding: 5px;
    }
}

@media (max-width: 768px) {
    /* --- OPTIMIZACIÓN DE MODALES --- */

    .modal {
        padding: 10px; /* Evita que el modal pegue de los bordes del cel */
        align-items: flex-start; /* Para que si el formulario es largo, empiece desde arriba */
        padding-top: 20px;
    }

    .modal-content {
        width: 100% !important;
        max-width: 100% !important;
        border-radius: 20px !important; /* Bordes más curvos, estilo app moderna */
        padding: 20px 15px !important;
        margin: 0;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    /* Título del modal más legible */
    #supplier-modal-title, 
    #recipe-modal-title,
    #product-modal-title { 
        font-size: 1.25rem !important;
        text-align: center;
        padding-bottom: 12px !important;
    }

    /* Formulario en una sola columna */
    .form-grid {
        display: flex !important;
        flex-direction: column !important;
        gap: 15px !important;
    }

    /* Inputs más grandes para "dedos reales" */
    .form-group input, 
    .form-group select, 
    .form-group textarea {
        height: 48px; /* Altura táctil estándar */
        font-size: 16px !important; /* Evita que iOS haga zoom automático al enfocar */
        border-radius: 10px !important;
        padding: 12px !important;
    }

    .form-group textarea {
        height: auto !important; /* Deja que las notas crezcan según el contenido */
        min-height: 80px;
    }

    /* Etiquetas (Labels) con más aire */
    .form-group label {
        font-size: 0.9rem;
        margin-bottom: 4px;
        color: #1e293b;
    }

    /* Botones de acción del modal (Guardar / Cancelar) */
    .modal-actions {
        display: flex !important;
        flex-direction: column-reverse !important; /* El botón de guardar queda arriba, más cerca del pulgar */
        gap: 12px !important;
        margin-top: 25px !important;
        padding-top: 20px !important;
        border-top: 1px solid #f1f5f9;
    }

    .modal-actions button {
        width: 100% !important;
        height: 50px !important; /* Botones grandes y fáciles de presionar */
        font-size: 1rem !important;
        font-weight: 700 !important;
        border-radius: 12px !important;
        margin: 0 !important; /* Quitamos márgenes laterales */
    }

    /* Estilo específico para el botón principal en móvil */
    .btn-primary {
        background: #3b82f6 !important; /* Azul Kont */
        color: white;
    }

    /* Ajuste para el Recipe Builder dentro del modal */
    .recipe-builder {
        padding: 10px !important;
        border: 1px dashed #cbd5e1;
        background: #f8fafc;
    }
}
  </style>
</head>
<body>

<div class="layout">
  <div id="sidebar"></div>
  <div class="content">
    <div id="header"></div>

    <div class="page" style="padding: 25px; background: #f8fafc; min-height: calc(100vh - 70px);">
      <div class="page-header" style="margin-bottom: 20px;">
        <h1 style="margin: 0; color: #1e293b; font-weight: 800;">📦 Inventario de Productos</h1>
        <p style="color: #64748b; margin-top: 5px;">Gestiona tus artículos, precios y niveles de stock.</p>
      </div>

      <div class="top-bar">
        <div class="search-box">
          <i class="bi bi-search"></i>
          <input type="text" id="search-product" placeholder="Buscar por nombre, categoría, proveedor o #...">
        </div>
        <button id="btn-new-product" class="btn-primary" style="padding: 10px 20px; font-weight: bold; border-radius: 8px;">
          <i class="bi bi-plus-lg"></i> <span>Nuevo Producto</span>
        </button>
      </div>

      <div class="card" style="background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow-x: auto; border: 1px solid #e2e8f0;">
        <table class="table" id="products-table" style="width: 100%; border-collapse: collapse; text-align: left;">
          <thead style="background: #f1f5f9; color: #475569; font-size: 0.85rem; text-transform: uppercase;">
            <tr>
              <th style="padding: 15px;">#</th>
              <th style="padding: 15px;">Nombre</th>
              <th style="padding: 15px;">Categoría</th>
              <th style="padding: 15px;">Proveedor</th>
              <th style="padding: 15px;">Retail</th>
              <th style="padding: 15px;">Mayor</th>
              <th style="padding: 15px;">Stock</th>
              <th style="padding: 15px;">Vence</th>
              <th style="padding: 15px; text-align: center;">Acciones</th>
            </tr>
          </thead>
          <tbody style="color: #334155; font-size: 0.9rem;"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal hidden" id="product-modal">
  <div class="modal-content" style="max-width: 600px; border-radius: 16px;">
    <h2 id="modal-title" style="margin-top: 0; color: #1e293b; font-weight: 800; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px;">Nuevo producto</h2>

    <form id="product-form">
      <input type="hidden" id="product-id">

      <div class="form-grid">
        <div class="form-group full-width">
          <label>Nombre del Producto *</label>
          <input type="text" id="product-name" placeholder="Ej. Kit de Herramientas / iPhone 15" required>
        </div>

        <div class="form-group">
          <label>Categoría *</label>
          <input type="text" id="product-category" list="category-list" placeholder="Ej: Electrónica, Insumos..." required autocomplete="off">
          <datalist id="category-list"></datalist>
        </div>

        <div class="form-group">
          <label>Proveedor *</label>
          <select id="product-supplier" required>
            <option value="">Cargando proveedores...</option>
          </select>
        </div>

        <div class="form-group full-width">
          <div class="switch-container">
            <div class="switch-label">
              <i class="bi bi-box-seam-fill"></i>
              <span>¿Es un Kit / Tiene receta?</span>
            </div>
            <label class="switch">
              <input type="checkbox" id="product-is-kit">
              <span class="slider"></span>
            </label>
          </div>
          <small style="color: #8b5cf6; font-size: 0.7rem; margin-left: 5px;">* Si se marca, el costo se calculará sumando sus insumos.</small>
        </div>

        <div class="form-group">
          <label>Unidad de Medida</label>
          <select id="product-unit">
            <option value="UNIDAD">Unidad (Pza)</option>
            <option value="KG">Kilogramos (Kg)</option>
            <option value="LT">Litros (Lt)</option>
          </select>
        </div>

        <div class="form-group">
          <div style="display: flex; justify-content: space-between;">
            <label>Costo de Compra ($) *</label>
            <a href="#" id="view-recipe-link" class="hidden" style="font-size: 0.75rem; color: #8b5cf6; font-weight: 700; text-decoration: none;">
              <i class="bi bi-receipt"></i> Ver Receta
            </a>
          </div>
          <input type="number" id="product-cost" step="0.01" min="0" placeholder="0.00" required>
        </div>

        <div class="form-group">
          <label>Precio Detalle / Retail ($) *</label>
          <input type="number" id="product-price-retail" step="0.01" min="0" placeholder="0.00" required>
        </div>

        <div class="form-group">
          <label>Precio Mayorista ($) *</label>
          <input type="number" id="product-price-mayor" step="0.01" min="0" placeholder="0.00" required>
        </div>

        <div class="form-group">
          <label>Stock Actual *</label>
          <input type="number" id="product-stock" step="0.01" min="0" placeholder="0" required>
        </div>

        <div class="form-group">
          <label>Stock Mínimo (Alerta) *</label>
          <input type="number" id="product-min-stock" step="0.01" min="0" value="5">
        </div>

        <div class="form-group full-width" style="flex-direction: row; align-items: center; gap: 10px; background: #f8fafc; padding: 10px; border-radius: 8px;">
          <input type="checkbox" id="product-has-expiry" style="width: 18px; height: 18px; cursor: pointer;">
          <label for="product-has-expiry" style="margin: 0; cursor: pointer;">Este producto tiene fecha de vencimiento</label>
        </div>

        <div class="form-group full-width hidden" id="expiry-wrap">
          <label>Fecha de vencimiento *</label>
          <input type="date" id="product-expiry-date">
        </div>
      </div>

      <div class="modal-actions" style="margin-top: 25px; border-top: 1px solid #e2e8f0; padding-top: 15px;">
        <button type="button" id="btn-cancel" class="btn-secondary" style="border-radius: 8px;">Cancelar</button>
        <button type="submit" class="btn-primary" style="border-radius: 8px;"><i class="bi bi-save"></i> Guardar Producto</button>
      </div>
    </form>
  </div>
</div>

<div class="modal hidden" id="confirm-modal">
  <div class="modal-content" style="max-width: 400px; text-align: center;">
    <div style="font-size: 3rem; color: #ef4444; margin-bottom: 10px;"><i class="bi bi-exclamation-circle"></i></div>
    <h2 id="confirm-title" style="margin-top: 0;">Confirmar</h2>
    <p id="confirm-message" class="text-soft" style="margin: 10px 0 20px;">¿Estás segura?</p>
    <div class="modal-actions" style="justify-content: center;">
      <button type="button" class="btn-secondary" id="confirm-cancel">No, cancelar</button>
      <button type="button" class="btn-danger" id="confirm-ok">Sí, confirmar</button>
    </div>
  </div>
</div>

<div class="modal hidden" id="alert-modal">
  <div class="modal-content" style="max-width: 400px; text-align: center;">
    <h2 id="alert-title" style="margin-top: 0;">Aviso</h2>
    <p id="alert-message" class="text-soft" style="margin: 10px 0 20px;">Mensaje</p>
    <div class="modal-actions" style="justify-content: center;">
      <button type="button" class="btn-primary" id="alert-ok" style="width: 100%;">Entendido</button>
    </div>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/productos.js"></script>

</body>
</html>
