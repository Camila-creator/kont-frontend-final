<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Gastos | Kont Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* 1. VARIABLES Y BASE */
        :root {
            --primary: #6366f1;
            --dark: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e2e8f0;
            --bg-light: #f8fafc;
        }

        /* 2. TOP BAR & FILTROS */
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            gap: 15px; 
            flex-wrap: wrap; 
            background: white; 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .total-badge {
            background: #fff1f2;
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid #ffe4e6;
            text-align: right;
        }

        /* 3. BOTONES DE ACCIÓN */
        .action-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn-kont-lg {
            padding: 20px;
            border-radius: 16px;
            border: none;
            color: white;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .btn-kont-lg:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .btn-fixed { background: var(--dark); }
        .btn-sporadic { background: var(--primary); }

        /* 4. MODAL PREMIUM */
        .modal-content {
            max-width: 600px;
            border-radius: 24px !important;
            border: none !important;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .form-grid-kont {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width { grid-column: span 2; }

        .form-group label {
            display: block;
            font-weight: 700;
            color: #475569;
            font-size: 0.85rem;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-light);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        .dynamic-section {
            padding: 15px;
            border-radius: 16px;
            margin-top: 10px;
            border: 2px dashed var(--border);
        }

        /* 5. TABLA Y BADGES */
        .badge { padding: 6px 12px; border-radius: 8px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; }
        .b-fijo { background: #e0f2fe; color: #0369a1; }
        .b-esporadico { background: #fef3c7; color: #92400e; }

/* 6. MEDIA QUERIES (PARA MÓVIL) */
@media (max-width: 768px) {
    .page { padding: 15px !important; }
    
    .action-container { 
        grid-template-columns: 1fr; 
        gap: 10px; 
    }
    
    .top-bar { 
        flex-direction: column; 
        align-items: stretch; 
        text-align: center; 
    }

    /* Convertir Tabla a Tarjetas */
    .expense-table-mobile, 
    .expense-table-mobile thead, 
    .expense-table-mobile tbody, 
    .expense-table-mobile th, 
    .expense-table-mobile td, 
    .expense-table-mobile tr { 
        display: block; 
        width: 100%;
    }

    .expense-table-mobile thead { display: none; } /* Ocultar cabecera real */

    .expense-table-mobile tr {
        background: white;
        margin-bottom: 20px;
        padding: 15px;
        border-radius: 20px;
        border: 1px solid var(--border);
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    .expense-table-mobile td {
        text-align: right;
        padding: 12px 5px;
        border-bottom: 1px solid var(--bg-light);
        position: relative;
        min-height: 45px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .expense-table-mobile td:last-child { 
        border: none; 
        justify-content: center; 
        background: var(--bg-light);
        margin-top: 10px;
        border-radius: 12px;
    }

    /* El truco del data-label */
    .expense-table-mobile td::before {
        content: attr(data-label);
        float: left;
        font-weight: 800;
        text-transform: uppercase;
        color: #94a3b8;
        font-size: 0.7rem;
    }

    /* Ajustes de Modal */
    .form-grid-kont { grid-template-columns: 1fr !important; }
    .full-width { grid-column: span 1 !important; }
    .modal-content { width: 95%; margin: 10px auto; }
}
    </style>
</head>
<body>

<div class="layout">
    <div id="sidebar"></div>
    <div class="content">
        <div id="header"></div>

        <div class="page" style="background: #f1f5f9; min-height: calc(100vh - 70px);">
            
            <div class="page-header" style="margin-bottom: 25px;">
                <h1 style="color: var(--dark); font-weight: 900; font-size: 2rem; letter-spacing: -1px;">💸 Control de Egresos</h1>
                <p style="color: #64748b;">Administra tus salidas de capital de forma inteligente.</p>
            </div>

            <div class="action-container">
                <button id="btn-new-fixed" class="btn-kont-lg btn-fixed">
                    <i class="bi bi-calendar2-check-fill"></i>
                    <span>Nuevo Gasto Fijo</span>
                </button>
                <button id="btn-new-sporadic" class="btn-kont-lg btn-sporadic">
                    <i class="bi bi-lightning-charge-fill"></i>
                    <span>Gasto Esporádico</span>
                </button>
            </div>

            <div class="top-bar">
                <div class="filter-group">
                    <label style="font-weight: 800; color: #94a3b8; font-size: 0.75rem; display: block; margin-bottom: 5px;">HISTÓRICO</label>
                    <select id="expense-period" class="form-group" style="padding: 8px 15px; min-width: 180px;">
                        <option value="weekly">Esta Semana</option>
                        <option value="monthly" selected>Este Mes</option>
                        <option value="quarterly">Trimestre</option>
                        <option value="yearly">Año Completo</option>
                    </select>
                </div>
                <div class="total-badge">
                    <span style="color: #f43f5e; font-size: 0.75rem; font-weight: 800; text-transform: uppercase;">Total Egresos</span>
                    <div id="display-total-expense" style="font-size: 1.8rem; font-weight: 900; color: var(--danger);">$ 0.00</div>
                </div>
            </div>

            <div class="card" style="border-radius: 20px; border: 1px solid var(--border); overflow: hidden; background: white; padding:0;">
                <table class="table expense-table-mobile" id="expenses-table" style="width: 100%; border-collapse: collapse;">
                    <thead style="background: var(--bg-light); border-bottom: 1px solid var(--border);">
                        <tr style="color: #64748b; font-size: 0.75rem; text-transform: uppercase; font-weight: 800;">
                            <th style="padding: 20px;">Fecha</th>
                            <th style="padding: 20px;">Concepto</th>
                            <th style="padding: 20px;">Tipo</th>
                            <th style="padding: 20px;">Destino</th>
                            <th style="padding: 20px; text-align: right;">Monto ($)</th>
                            <th style="padding: 20px; text-align: center;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="expenses-body" style="font-size: 0.95rem; color: var(--dark);">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal hidden" id="expense-modal">
    <div class="modal-content">
        <div style="padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <h2 id="modal-title" style="margin:0; font-weight: 900; color: var(--dark);">Registrar Egreso</h2>
            <button type="button" class="close-modal-btn" style="background:none; border:none; font-size:1.8rem; color:#94a3b8; cursor:pointer;"><i class="bi bi-x-circle-fill"></i></button>
        </div>

        <form id="expense-form" style="padding: 25px;">
            <input type="hidden" id="expense-category">
            
            <div class="form-grid-kont">
                <div class="form-group full-width">
                    <label>CONCEPTO DEL GASTO</label>
                    <input type="text" id="exp-name" placeholder="Ej: Pago de Internet, Repuestos..." required>
                </div>

                <div class="form-group">
    <label id="label-amount">MONTO</label>
    <div style="display: flex; gap: 8px;">
        <input type="number" id="exp-amount" step="0.01" placeholder="0.00" required>
        <span id="currency-addon" style="background: var(--bg-light); padding: 12px; border-radius: 12px; border: 1px solid var(--border); font-weight: 800; color: #64748b;">$</span>
    </div>
</div>

<div id="section-exchange" class="form-group hidden" style="grid-column: span 2; background: #fff1f2; padding: 15px; border-radius: 16px; border: 1px solid #ffe4e6;">
    <label style="color: #e11d48;">ESTÁS PAGANDO EN BS. — SELECCIONA TASA</label>
    <div style="display: flex; gap: 15px; align-items: center;">
        <div style="flex: 1;">
            <select id="exp-rate-type" style="border-color: #fda4af;">
                <option value="USD">Tasa BCV (USD)</option>
                <option value="EUR">Tasa BCV (EUR)</option>
                <option value="CUSTOM">Tasa Personalizada</option>
            </select>
        </div>
        <div style="flex: 1;">
            <input type="number" id="exp-rate-value" step="0.0001" style="border-color: #fda4af; font-weight: 800; color: #e11d48;">
        </div>
    </div>
    <p style="margin-top: 8px; font-size: 0.8rem; color: #be123c;">Equivale a: <strong id="conversion-preview">$ 0.00</strong></p>
</div>

                <div class="form-group">
                    <label>FECHA</label>
                    <input type="date" id="exp-date" required>
                </div>

                <div id="section-fixed" class="full-width dynamic-section hidden" style="background: #f0f9ff; border-color: #bae6fd;">
                    <div class="form-grid-kont">
                        <div class="form-group">
                            <label>PROVEEDOR</label>
                            <select id="exp-supplier-id"></select>
                        </div>

                        <div class="form-group">
    <label>CUENTA DE ORIGEN</label>
    <select id="exp-account" required>
        <option value="">Selecciona una cuenta...</option>
        </select>
</div>
                    </div>
                </div>

                <div id="section-sporadic" class="full-width dynamic-section hidden" style="background: #fffbeb; border-color: #fde68a;">
                    <div class="form-group full-width">
                        <label>¿DÓNDE SE COMPRÓ?</label>
                        <input type="text" id="exp-place" placeholder="Ej: Ferretería El Gancho, Amazon...">
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>MÉTODO DE PAGO</label>
                    <select id="exp-method">
                        <option value="Efectivo">Efectivo ($ / Bs)</option>
                        <option value="Transferencia">Transferencia</option>
                        <option value="Pago Movil">Pago Móvil</option>
                        <option value="Zelle">Zelle / PayPal</option>
                    </select>
                </div>
            </div>

            <div class="modal-actions" style="margin-top: 25px; display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" class="btn-secondary close-modal-btn" style="padding: 12px 25px; border-radius: 12px;">Cancelar</button>
                <button type="submit" class="btn-primary" style="background: var(--success); border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; color: white;">
                    Confirmar Registro
                </button>
            </div>
        </form>
    </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/gastos.js"></script>
</body>
</html>
